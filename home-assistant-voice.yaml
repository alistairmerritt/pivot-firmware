text_sensor:
  # Sync bank display colours from Pivot integration (hex string e.g. #2889FF).
  # When mirror is on this holds the assigned light's colour; when mirror is off
  # it holds the user's configured colour.  The LED ring always uses bank_r/g/b_N.
  - platform: homeassistant
    id: ha_bank_color_0
    entity_id: text.${device_suffix}_bank_0_color
    on_value:
      then:
      - lambda: |
            std::string hex = x;
            if (hex.size() == 7 && hex[0] == '#') {
              auto hval = [](char c) -> int {
                if (c >= '0' && c <= '9') return c - '0';
                if (c >= 'a' && c <= 'f') return c - 'a' + 10;
                if (c >= 'A' && c <= 'F') return c - 'A' + 10;
                return 0;
              };
              int r = (hval(hex[1]) << 4) | hval(hex[2]);
              int g = (hval(hex[3]) << 4) | hval(hex[4]);
              int b = (hval(hex[5]) << 4) | hval(hex[6]);
              id(bank_r_0) = r;
              id(bank_g_0) = g;
              id(bank_b_0) = b;
