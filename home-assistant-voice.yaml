substitutions:
  # =======================================================================
  # PIVOT DEVICE CONFIGURATION — fill in these values for each device
  # =======================================================================

  # ESPHome device name (slug, no spaces or dashes)
  device_name: home_assistant_voice_lounge

  # Friendly name shown in HA and ESPHome
  device_friendly_name: Lounge VPE

  # Pivot device suffix — unique per device, no spaces or dashes
  # Must match exactly what you enter in the Pivot integration
  device_suffix: ha_voice_lounge

  # WiFi credentials
  wifi_ssid: "YourWiFiName"
  wifi_password: "YourWiFiPassword"

  # API encryption key — generate one at:
  # https://esphome.io/components/api.html#configuration-variables
  api_encryption_key: "your_generated_key_here"

  # LED orientation — set based on how your device is mounted:
  #   flat:    cable faces away, device is flat on a surface (LEDs start at bottom)
  #   upright: cable faces down, device is on a stand (LEDs start at top)
  # This controls which LED is position 0 on the ring.
  led_offset: '6'  # flat (use '0' for upright)

  # =======================================================================

  # Phases of the Voice Assistant
  # The voice assistant is ready to be triggered by a wake word
  voice_assist_idle_phase_id: '1'
  # The voice assistant is waiting for a voice command (after being triggered by the wake word)
  voice_assist_waiting_for_command_phase_id: '2'
  # The voice assistant is listening for a voice command
  voice_assist_listening_for_command_phase_id: '3'
  # The voice assistant is currently processing the command
  voice_assist_thinking_phase_id: '4'
  # The voice assistant is replying to the command
  voice_assist_replying_phase_id: '5'
  # The voice assistant is not ready
  voice_assist_not_ready_phase_id: '10'
  # The voice assistant encountered an error
  voice_assist_error_phase_id: '11'
  # Change this to true in case you ahve a hidden SSID at home.
  hidden_ssid: "false"
  # Substitutions for audio files
  jack_connected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_connected.flac
  jack_disconnected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_disconnected.flac
  mute_switch_on_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  timer_finished_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  wake_word_triggered_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
  center_button_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
  center_button_double_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
  center_button_triple_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
  center_button_long_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
  factory_reset_confirmed_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_confirmed.mp3
  easter_egg_tick_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/easter_egg_tick.mp3
  easter_egg_tada_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/easter_egg_tada.mp3
  error_cloud_expired_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  name_add_mac_suffix: false
  min_version: 2026.2.0
  on_boot:
    priority: 375
    then:
      # Run the script to refresh the LED status
      - script.execute: control_leds
      - delay: 1s
      - switch.turn_on: internal_speaker_amp
      # If after 10 minutes, the device is still initializing (It did not yet connect to Home Assistant), turn off the init_in_progress variable and run the script to refresh the LED status
      - delay: 10min
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: control_leds

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

wifi:
  id: wifi_id
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: ${hidden_ssid}
  on_connect:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds

network:
  enable_ipv6: true

logger:
  level: DEBUG
  logs:
    sensor: WARN  # avoids logging debug sensor updates

api:
  id: api_id
  on_client_connected:
    - script.execute: set_mode_led_color
    - script.execute: control_leds
    - lambda: |-
        id(bank_passive_0) = id(ha_bank_passive_0).state;
        id(bank_passive_1) = id(ha_bank_passive_1).state;
        id(bank_passive_2) = id(ha_bank_passive_2).state;
        id(bank_passive_3) = id(ha_bank_passive_3).state;
    # Re-sync all display-affecting state after a short delay.
    # on_state callbacks for homeassistant binary sensors only fire when the value
    # changes — if HA restores the same value the firmware had cached, the callback
    # is skipped and the initial control_leds run above may be based on stale
    # NVS/in-memory values. After 2 s HA has finished pushing all entity states,
    # so we explicitly re-read and re-render to guarantee the LEDs are correct.
    - delay: 2s
    - lambda: |-
        id(control_mode) = id(ha_control_mode).state;
        id(show_control_value) = id(ha_show_control_value).state;
        id(bank_passive_0) = id(ha_bank_passive_0).state;
        id(bank_passive_1) = id(ha_bank_passive_1).state;
        id(bank_passive_2) = id(ha_bank_passive_2).state;
        id(bank_passive_3) = id(ha_bank_passive_3).state;
    - script.execute: set_mode_led_color
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds
  encryption:
    key: ${api_encryption_key}
ota:
  - platform: esphome
    id: ota_esphome

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false  # The VPE has PSRAM, so this is safe. Allows configuring WiFi driver to use more resources (done automatically by the speaker media player)

globals:
  # Global index for our LEDs. So that switching between different animation does not lead to unwanted effects.
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  # Global initialization variable. Initialized to true and set to false once everything is connected. Only used to have a smooth "plugging" experience
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  # Global variable storing the state of ImprovBLE. Used to draw different LED animations
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking the phase of the voice assistant (defined above). Initialized to not_ready
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  # Global variable tracking if the dial was recently touched.
  - id: dial_touched
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the LED color was recently changed.
  - id: color_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the group media player volume was recent changed.
  - id: group_volume_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been plugged touched.
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been unplugged touched.
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable storing the first active timer
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  # Global variable storing if a timer is active
  - id: is_timer_active
    type: bool
    restore_value: false
  # Global variable storing if a factory reset was requested. If it is set to true, the device will factory reset once the center button is released
  - id: factory_reset_requested
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the device is in control mode (true) or listening mode (false)
  - id: control_mode
    type: bool
    restore_value: yes
    initial_value: 'false'
  # Active bank index (0–3)
  - id: active_bank
    type: int
    restore_value: yes
    initial_value: '0'
  # Per-bank cached values for immediate LED feedback
  - id: bank_value_0
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: bank_value_1
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: bank_value_2
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: bank_value_3
    type: float
    restore_value: yes
    initial_value: '0.0'
  # Flag to suppress HA->device sync while the user is actively turning the knob
  - id: bank_updating
    type: bool
    restore_value: no
    initial_value: 'false'
  # Flag to temporarily show bank indicator LEDs after a bank switch
  - id: bank_display_active
    type: bool
    restore_value: no
    initial_value: 'false'
  # Mirrors switch.${device_suffix}_show_control_value — keeps gauge LEDs on permanently when true
  - id: show_control_value
    type: bool
    restore_value: no
    initial_value: 'false'
  # Mirrors switch.${device_suffix}_dim_when_idle — dims LEDs to 50% after 2s of no interaction
  - id: dim_when_idle
    type: bool
    restore_value: no
    initial_value: 'false'
  # Timestamp (ms) of the last knob/button/bank interaction — used for idle detection
  - id: last_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # True when device has been idle for >2s and dim_when_idle is active
  - id: led_is_idle
    type: bool
    restore_value: no
    initial_value: 'false'
  # Whether each bank is passive (scene/script) — knob does nothing
  - id: bank_passive_0
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_passive_1
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_passive_2
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_passive_3
    type: bool
    restore_value: yes
    initial_value: 'false'
  # Per-bank LED colours (RGB components, restored across reboots)
  # Defaults: Blue, Orange, Green, Purple
  - id: bank_r_0
    type: int
    restore_value: yes
    initial_value: '40'
  - id: bank_g_0
    type: int
    restore_value: yes
    initial_value: '137'
  - id: bank_b_0
    type: int
    restore_value: yes
    initial_value: '255'
  - id: bank_r_1
    type: int
    restore_value: yes
    initial_value: '255'
  - id: bank_g_1
    type: int
    restore_value: yes
    initial_value: '125'
  - id: bank_b_1
    type: int
    restore_value: yes
    initial_value: '25'
  - id: bank_r_2
    type: int
    restore_value: yes
    initial_value: '151'
  - id: bank_g_2
    type: int
    restore_value: yes
    initial_value: '255'
  - id: bank_b_2
    type: int
    restore_value: yes
    initial_value: '61'
  - id: bank_r_3
    type: int
    restore_value: yes
    initial_value: '200'
  - id: bank_g_3
    type: int
    restore_value: yes
    initial_value: '0'
  - id: bank_b_3
    type: int
    restore_value: yes
    initial_value: '255'

  # Per-bank mirror light flag — true = mirror assigned RGB light colour
  - id: bank_mirror_0
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_mirror_1
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_mirror_2
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: bank_mirror_3
    type: bool
    restore_value: yes
    initial_value: 'false'

  # Configured (pre-mirror) colour per bank — saved when mirror is off so the
  # bank's chosen colour can be shown while the knob is actively being turned,
  # even if mirror has overwritten bank_r/g/b with the light's colour.
  # bank_mirror_r_0 was missing from the original globals — fixed here.
  - id: bank_mirror_r_0
    type: int
    restore_value: yes
    initial_value: '40'   # matches bank_r_0 default (Blue)
  - id: bank_mirror_g_0
    type: int
    restore_value: yes
    initial_value: '137'  # matches bank_g_0 default
  - id: bank_mirror_b_0
    type: int
    restore_value: yes
    initial_value: '255'  # matches bank_b_0 default
  - id: bank_mirror_r_1
    type: int
    restore_value: yes
    initial_value: '255'  # matches bank_r_1 default (Orange)
  - id: bank_mirror_g_1
    type: int
    restore_value: yes
    initial_value: '125'  # matches bank_g_1 default
  - id: bank_mirror_b_1
    type: int
    restore_value: yes
    initial_value: '25'   # matches bank_b_1 default
  - id: bank_mirror_r_2
    type: int
    restore_value: yes
    initial_value: '151'  # matches bank_r_2 default (Green)
  - id: bank_mirror_g_2
    type: int
    restore_value: yes
    initial_value: '255'  # matches bank_g_2 default
  - id: bank_mirror_b_2
    type: int
    restore_value: yes
    initial_value: '61'   # matches bank_b_2 default
  - id: bank_mirror_r_3
    type: int
    restore_value: yes
    initial_value: '200'  # matches bank_r_3 default (Purple)
  - id: bank_mirror_g_3
    type: int
    restore_value: yes
    initial_value: '0'    # matches bank_g_3 default
  - id: bank_mirror_b_3
    type: int
    restore_value: yes
    initial_value: '255'  # matches bank_b_3 default

  - id: bank_mirror_light_on_1
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bank_mirror_light_on_2
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bank_mirror_light_on_3
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  # This is the master mute switch. It is exposed to Home Assistant. The user can only turn it on and off if the hardware switch is off. (The hardware switch overrides the software one)
  - platform: template
    id: master_mute_switch
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:microphone-off"
    name: Mute
    entity_category: config
    lambda: |-
      // Muted either if the hardware mute switch is on or the microphone's software mute switch is enabled
      if (id(hardware_mute_switch).state || id(i2s_mics).get_mute_state()) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.mute:
    turn_off_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.unmute:
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds
  # Wake Word Sound Switch.
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Internal switch to track when a timer is ringing on the device.
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Disable stop wake word
      - micro_wake_word.disable_model: stop
      - script.execute: disable_repeat
      # Stop any current announcement (ie: stop the timer ring mid playback)
      - if:
          condition:
            media_player.is_announcing:
              id: external_media_player
          then:
            media_player.stop:
              announcement: true
              id: external_media_player
      # Set back ducking ratio to zero
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      # Refresh the LED ring
      - script.execute: control_leds
      # If this was a Pivot timer alert (timer_state == alerting), notify HA
      # so the integration knows the alarm was dismissed (by button, stop wake
      # word, or 15-minute timeout).  Guarded so native voice-assistant timers
      # (which also use timer_ringing) don't interfere with Pivot timer state.
      - if:
          condition:
            text_sensor.state:
              id: ha_timer_state
              state: "alerting"
          then:
            - homeassistant.action:
                action: select.select_option
                data:
                  entity_id: select.${device_suffix}_timer_state
                  option: idle
            - homeassistant.action:
                action: switch.turn_on
                data:
                  entity_id: switch.${device_suffix}_dim_when_idle
    on_turn_on:
      # Duck audio
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      # Enable stop wake word
      - micro_wake_word.enable_model: stop
      # Ring timer
      - script.execute: ring_timer
      # Refresh LED
      - script.execute: control_leds
      # If 15 minutes have passed and the timer is still ringing, stop it.
      - delay: 15min
      - switch.turn_off: timer_ringing
  - platform: gpio
    pin: GPIO47
    id: internal_speaker_amp
    name: "Internal speaker amp"
    entity_category: config
    restore_mode: ALWAYS_OFF
    internal: true

binary_sensor:
  # Center Button. Used for many things (See on_multi_click)
  - platform: gpio
    id: center_button
    pin:
      number: GPIO0
      inverted: true
    on_press:
      - lambda: id(last_interaction_ms) = millis(); id(led_is_idle) = false;
      - script.execute: control_leds
    on_release:
      - script.execute: control_leds
      # If a factory reset is requested, factory reset on release
      - if:
          condition:
            lambda: return id(factory_reset_requested);
          then:
            - button.press: factory_reset_button
    on_multi_click:
      # Simple Click:
      #   - Abort "things" in order
      #     - Timer
      #     - Announcements
      #     - Voice Assistant Pipeline run
      #     - Music
      #   - Starts the voice assistant if it is not yet running and if the device is not muted.
      - timing:
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed) && !id(dial_touched);
              then:
                - if:
                    condition:
                      switch.is_on: timer_ringing
                    then:
                      - switch.turn_off: timer_ringing
                    else:
                      - if:
                          condition:
                            voice_assistant.is_running:
                          then:
                            - voice_assistant.stop:
                          else:
                            - lambda: id(button_press_event).trigger("single_press");
                            - if:
                                condition:
                                  media_player.is_announcing:
                                    id: external_media_player
                                then:
                                  media_player.stop:
                                    announcement: true
                                    id: external_media_player
                                else:
                                  - if:
                                      condition:
                                        media_player.is_playing:
                                          id: external_media_player
                                      then:
                                        - media_player.pause:
                                            id: external_media_player
                                      else:
                                        - if:
                                            condition:
                                              lambda: return id(control_mode);
                                            then:
                                              - homeassistant.action:
                                                  action: script.turn_on
                                                  data:
                                                    entity_id: script.${device_suffix}_bank_toggle
                                            else:
                                              - if:
                                                  condition:
                                                    and:
                                                      - switch.is_off: master_mute_switch
                                                      - not: voice_assistant.is_running
                                                  then:
                                                    - script.execute:
                                                        id: play_sound
                                                        priority: true
                                                        sound_file: "center_button_press_sound"
                                                    - delay: 300ms
                                                    - voice_assistant.start:
      # Double Click
      #  . Toggles control mode on/off
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - lambda: id(control_mode) = !id(control_mode);
                - script.execute: set_mode_led_color
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: "center_button_double_press_sound"
                - delay: 1200ms
                - if:
                    condition:
                      lambda: return id(control_mode);
                    then:
                      - homeassistant.action:
                          action: switch.turn_on
                          data:
                            entity_id: switch.${device_suffix}_control_mode
                    else:
                      - homeassistant.action:
                          action: switch.turn_off
                          data:
                            entity_id: switch.${device_suffix}_control_mode
                - lambda: id(button_press_event).trigger("double_press");
      # Triple Click
      #  . Exposed as an event entity. To be used in automations inside Home Assistant
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - lambda: id(button_press_event).trigger("triple_press");
      # Long Press (1s+)
      #  . Exposed as an event entity. To be used in automations inside Home Assistant
      #  . Suppressed if the dial is being turned
      - timing:
          - ON for at least 1s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed) && !id(dial_touched);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: "center_button_long_press_sound"
                - light.turn_off: voice_assistant_leds
                - lambda: id(button_press_event).trigger("long_press");
      # Very important do not remove. Trust me :D
      - timing:
          # H ....
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0.5s to 2s
          # A ._
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for 0.2s to 2s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Tick"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "easter_egg_tick_sound"
                - delay: 4s
                - light.turn_off: voice_assistant_leds
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "easter_egg_tada_sound"
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Rainbow"
                - lambda: id(button_press_event).trigger("easter_egg_press");
      # Factory Reset Warning
      #  . Audible and Visible warning.
      - timing:
          - ON for at least 10s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Factory Reset Coming Up"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_initiated_sound"
                - wait_until:
                    binary_sensor.is_off: center_button
                - if:
                    condition:
                      lambda: return !id(factory_reset_requested);
                    then:
                      - light.turn_off: voice_assistant_leds
                      - script.execute:
                          id: play_sound
                          priority: true
                          sound_file: "factory_reset_cancelled_sound"
      # Factory Reset Confirmed.
      #  . Audible warning to prompt user to release the button
      #  . Set factory_reset_requested to true
      - timing:
          - ON for at least 22s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_confirmed_sound"
                - light.turn_on:
                    brightness: 100%
                    red: 100%
                    green: 0%
                    blue: 0%
                    id: voice_assistant_leds
                    effect: "none"
                - lambda: id(factory_reset_requested) = true;

  # Hardware mute switch (Side of the device)
  - platform: gpio
    id: hardware_mute_switch
    internal: true
    pin: GPIO3
    on_press:
      # Play mute on sound only if software mute isn't enabled
      - if:
          condition:
            - switch.is_off: master_mute_switch
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: "mute_switch_on_sound"
    on_release:
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "mute_switch_off_sound"
      - microphone.unmute:
  # Audio Jack Plugged sensor
  - platform: gpio
    id: jack_plugged
    # Debouncing it a bit because it can be activated back and forth as you plug the audio jack
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    pin:
      number: GPIO17
    # When the jack is plugged in:
    #  - LED animation
    #  - Sound played
    on_press:
      - lambda: id(jack_plugged_recently) = true;
      - script.execute: control_leds
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "jack_connected_sound"
      - delay: 800ms
      - lambda: id(jack_plugged_recently) = false;
      - script.execute: control_leds
    # When the jack is unplugged:
    #  - LED animation
    #  - Sound played
    on_release:
      - lambda: id(jack_unplugged_recently) = true;
      - script.execute: control_leds
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: "jack_disconnected_sound"
      - delay: 800ms
      - lambda: id(jack_unplugged_recently) = false;
      - script.execute: control_leds

  # Sync passive flags from HA template binary sensors (on = scene/script bank, knob disabled)
  - platform: homeassistant
    id: ha_bank_passive_0
    entity_id: binary_sensor.${device_suffix}_bank_0_passive
